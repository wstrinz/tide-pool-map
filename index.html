<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Realms of the Tide Pool — Interactive Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Uncial+Antiqua&family=IM+Fell+English+SC&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    font-family: 'IM Fell English SC', serif;
  }

  body.grabbing { cursor: grabbing; }

  #map-viewport {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  #map-container {
    transform-origin: 0 0;
    position: absolute;
    will-change: transform;
  }

  svg.map {
    display: block;
  }

  /* SVG Text Classes */
  .title-text { font-family: 'Uncial Antiqua', cursive; fill: #2a1f14; }
  .subtitle-text { font-family: 'IM Fell English SC', serif; fill: #5c4a2e; }
  .kingdom-name { font-family: 'Uncial Antiqua', cursive; fill: #2a1f14; }
  .kingdom-subtitle { font-family: 'IM Fell English SC', serif; fill: #6b5a3e; }
  .region-name { font-family: 'IM Fell English SC', serif; fill: rgba(50,80,110,0.4); letter-spacing: 6px; }
  .lore-text { font-family: 'IM Fell DW Pica', serif; fill: rgba(80,65,40,0.45); font-style: italic; }
  .legend-title { font-family: 'Uncial Antiqua', cursive; fill: #2a1f14; }
  .legend-text { font-family: 'IM Fell English SC', serif; fill: #5c4a2e; }
  .compass-text { font-family: 'Uncial Antiqua', cursive; fill: #3d2b1f; }

  /* Interactive kingdom areas */
  .kingdom-hitbox {
    cursor: pointer;
    transition: filter 0.3s ease;
  }
  .kingdom-hitbox:hover {
    filter: drop-shadow(0 0 12px rgba(200,160,80,0.6));
  }
  .kingdom-hitbox:hover .kingdom-name {
    fill: #8b4513;
  }

  /* Animated flame */
  @keyframes flicker {
    0%, 100% { opacity: 0.5; r: 6; }
    25% { opacity: 0.7; r: 7; }
    50% { opacity: 0.4; r: 5.5; }
    75% { opacity: 0.65; r: 6.5; }
  }
  .flame-outer { animation: flicker 2s ease-in-out infinite; }

  @keyframes flicker-inner {
    0%, 100% { opacity: 0.6; }
    33% { opacity: 0.8; }
    66% { opacity: 0.5; }
  }
  .flame-inner { animation: flicker-inner 1.5s ease-in-out infinite; }

  @keyframes flicker-core {
    0%, 100% { opacity: 0.7; r: 2; }
    50% { opacity: 0.9; r: 2.5; }
  }
  .flame-core { animation: flicker-core 1s ease-in-out infinite; }

  /* Animated waves */
  @keyframes waveFloat {
    0% { transform: translateX(0); }
    50% { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }
  .wave-anim { animation: waveFloat 4s ease-in-out infinite; }
  .wave-anim-slow { animation: waveFloat 6s ease-in-out infinite; }

  /* Volcanic glow */
  @keyframes volcGlow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.5; }
  }
  .volc-glow { animation: volcGlow 3s ease-in-out infinite; }

  /* Info Panel */
  #info-panel {
    position: fixed;
    right: -420px;
    top: 50%;
    transform: translateY(-50%);
    width: 380px;
    max-height: 80vh;
    background: linear-gradient(135deg, #d4b896, #c4a67a);
    border: 2px solid #8b7a5e;
    border-right: none;
    border-radius: 8px 0 0 8px;
    padding: 30px 25px;
    box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 100;
    overflow-y: auto;
  }
  #info-panel.open { right: 0; }

  #info-panel h2 {
    font-family: 'Uncial Antiqua', cursive;
    color: #2a1f14;
    font-size: 22px;
    margin-bottom: 4px;
  }
  #info-panel .panel-title-line {
    font-family: 'IM Fell English SC', serif;
    color: #6b5a3e;
    font-size: 12px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  #info-panel .panel-lore {
    font-family: 'IM Fell DW Pica', serif;
    color: #3d2b1f;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
    border-left: 2px solid rgba(139,105,20,0.3);
    padding-left: 12px;
  }
  #info-panel .panel-details {
    font-family: 'IM Fell English SC', serif;
    color: #5c4a2e;
    font-size: 13px;
    line-height: 1.7;
  }
  #info-panel .panel-details strong {
    color: #3d2b1f;
  }
  #info-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 15px;
    background: none;
    border: none;
    font-size: 20px;
    color: #6b5a3e;
    cursor: pointer;
    font-family: 'IM Fell English SC', serif;
  }
  #info-panel .close-btn:hover { color: #3d2b1f; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(42,31,20,0.9);
    color: #d4b896;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid rgba(139,105,20,0.4);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 200;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  /* Controls */
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 50;
  }
  #controls button {
    background: rgba(42,31,20,0.85);
    color: #d4b896;
    border: 1px solid rgba(139,105,20,0.4);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #controls button:hover {
    background: rgba(60,45,25,0.9);
    border-color: rgba(139,105,20,0.7);
  }

  /* Zoom indicator */
  #zoom-level {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(42,31,20,0.7);
    color: #d4b896;
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    z-index: 50;
  }

  /* Credit */
  #credit {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(212,184,150,0.4);
    font-family: 'IM Fell DW Pica', serif;
    font-size: 11px;
    font-style: italic;
    z-index: 50;
  }
</style>
</head>

// Pan & Zoom state
let scale = 1;
let panX = 0;
let panY = 0;
let isDragging = false;
let startX, startY;
const MIN_SCALE = 0.3;
const MAX_SCALE = 5;

const container = document.getElementById('map-container');
const viewport = document.getElementById('map-viewport');
const zoomDisplay = document.getElementById('zoom-level');
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('info-panel');

function updateTransform() {
  container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
}

function fitToScreen() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const sw = 2800, sh = 2100;
  scale = Math.min(vw / sw, vh / sh) * 0.95;
  panX = (vw - sw * scale) / 2;
  panY = (vh - sh * scale) / 2;
  updateTransform();
}

// Initial fit
window.addEventListener('load', fitToScreen);
window.addEventListener('resize', fitToScreen);

// Mouse wheel zoom
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldScale = scale;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * delta));

  // Zoom toward mouse position
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);

  updateTransform();
}, { passive: false });

// Pan with mouse drag
viewport.addEventListener('mousedown', (e) => {
  if (e.target.closest('.kingdom-hitbox')) return;
  isDragging = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  document.body.classList.add('grabbing');
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  updateTransform();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('grabbing');
});

// Touch support
let lastTouchDist = 0;
let lastTouchMid = { x: 0, y: 0 };

viewport.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX - panX;
    startY = e.touches[0].clientY - panY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, { passive: false });

viewport.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    panX = e.touches[0].clientX - startX;
    panY = e.touches[0].clientY - startY;
    updateTransform();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const mid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };

    if (lastTouchDist > 0) {
      const oldScale = scale;
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * (dist / lastTouchDist)));
      const rect = viewport.getBoundingClientRect();
      const mx = mid.x - rect.left;
      const my = mid.y - rect.top;
      panX = mx - (mx - panX) * (scale / oldScale);
      panY = my - (my - panY) * (scale / oldScale);
    }

    lastTouchDist = dist;
    lastTouchMid = mid;
    updateTransform();
  }
}, { passive: false });

viewport.addEventListener('touchend', () => {
  isDragging = false;
  lastTouchDist = 0;
});

// Button controls
function zoomIn() {
  const cx = viewport.clientWidth / 2;
  const cy = viewport.clientHeight / 2;
  const oldScale = scale;
  scale = Math.min(MAX_SCALE, scale * 1.3);
  panX = cx - (cx - panX) * (scale / oldScale);
  panY = cy - (cy - panY) * (scale / oldScale);
  updateTransform();
}

function zoomOut() {
  const cx = viewport.clientWidth / 2;
  const cy = viewport.clientHeight / 2;
  const oldScale = scale;
  scale = Math.max(MIN_SCALE, scale * 0.7);
  panX = cx - (cx - panX) * (scale / oldScale);
  panY = cy - (cy - panY) * (scale / oldScale);
  updateTransform();
}

function resetView() {
  scale = 1;
  panX = 0;
  panY = 0;
  updateTransform();
}

// Kingdom interactions
document.querySelectorAll('.kingdom-hitbox').forEach(el => {
  const key = el.dataset.kingdom;
  const data = kingdoms[key];

  el.addEventListener('mouseenter', (e) => {
    tooltip.textContent = data.name + ' — Click to explore';
    tooltip.classList.add('visible');
  });

  el.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openPanel(key);
  });
});

function openPanel(key) {
  const data = kingdoms[key];
  document.getElementById('panel-name').textContent = data.name;
  document.getElementById('panel-titles').textContent = data.titles;
  document.getElementById('panel-lore').textContent = data.lore;
  document.getElementById('panel-details').innerHTML = data.details;
  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
}

// Close panel on background click
viewport.addEventListener('click', (e) => {
  if (!e.target.closest('.kingdom-hitbox') && !e.target.closest('#info-panel')) {
    closePanel();
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') fitToScreen();
});
</script>
